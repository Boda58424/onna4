<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory 2006 - Interactive Clothesline</title>
    <style>
        /* --- المتغيرات والتصميم الأساسي --- */
        :root { 
            --rope-color: #5d4037; 
            --clip-color: #d4a373; 
            --accent: #38bdf8; 
            --bg-dark: #000814;
            --bg-blue: #001d3d;
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: radial-gradient(circle at center, var(--bg-blue) 0%, var(--bg-dark) 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            user-select: none; /* منع تحديد النص بالخطأ أثناء السحب */
        }
        
        /* --- تأثير النجوم الخلفية --- */
        .stars-container { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 0; 
            pointer-events: none; 
        }
        .star { 
            position: absolute; 
            background: white; 
            border-radius: 50%; 
            animation: twinkle var(--duration) infinite ease-in-out; 
        }
        @keyframes twinkle { 
            0%, 100% { opacity: 0.3; transform: scale(1); } 
            50% { opacity: 1; transform: scale(1.3); } 
        }
        
        /* --- التاريخ الخلفي الكبير --- */
        .back-date { 
            position: fixed; 
            top: 55%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: clamp(5rem, 15vw, 12rem); 
            font-weight: 900; 
            color: rgba(255, 255, 255, 0.03); /* شفافية عالية جداً */
            z-index: 1; 
            pointer-events: none; 
            filter: blur(2px); 
        }

        /* --- حاوية حبل الغسيل الرئيسية (تدعم السحب) --- */
        .clothesline-wrapper { 
            position: relative; 
            top: 30%; 
            width: 100%; 
            height: 500px; 
            cursor: grab; 
            z-index: 10; 
            overflow-x: auto; 
            white-space: nowrap; 
            scrollbar-width: none; /* إخفاء شريط التمرير لـ Firefox */
            padding-top: 50px; 
        }
        .clothesline-wrapper::-webkit-scrollbar { display: none; } /* إخفاء شريط التمرير لـ Chrome/Safari */
        
        /* الحبل */
        .rope { 
            position: absolute; 
            top: 85px; 
            left: -200%; /* ممتد للخلفية */
            right: -200%; 
            height: 4px; 
            background: linear-gradient(90deg, #3e2723 0%, #795548 50%, #3e2723 100%); 
            z-index: 5; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }
        
        /* --- عنصر الصورة التفاعلي والمشابك --- */
        .photo-item { 
            display: inline-block; 
            position: relative; 
            margin: 0 45px; 
            vertical-align: top; 
            z-index: 6; 
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* حركة مطاطية احترافية */
            -webkit-tap-highlight-color: transparent; /* منع الوميض الأزرق على الموبايل */
        }

        /* تأثير التكبير عند الوقوف بالماوس أو اللمس النشط */
        .photo-item:hover, .photo-item:active {
            transform: scale(1.25) rotate(0deg) !important; /* تكبير وإلغاء الدوران وقت العرض */
            z-index: 100; /* تطلع فوق باقي الصور والحبل */
        }

        /* المشبك الخشبي */
        .clip { 
            position: absolute; 
            top: 0px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 12px; 
            height: 45px; 
            background: var(--clip-color); 
            border-radius: 2px; 
            z-index: 10; 
            border-left: 1px solid #b1865a; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3); 
            transition: 0.3s;
        }
        
        /* تفاصيل الصورة (إطار البولارويد) */
        .photo-item img { 
            width: 180px; 
            height: 240px; 
            object-fit: cover; 
            border: 8px solid #fff; 
            border-bottom: 35px solid #fff; /* حافة سفلية أعرض لشكل البولارويد */
            box-shadow: 10px 20px 30px rgba(0,0,0,0.5); 
            transform: rotate(var(--rotation)); /* دوران عشوائي مخزن في الداتابيز */
            margin-top: 15px; 
            display: block; 
            transition: 0.3s;
        }

        /* تعميق الظل وتغيير لون الإطار عند التكبير */
        .photo-item:hover img, .photo-item:active img {
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            border-color: #f8fafc;
        }

        /* --- لوحة التحكم المخفية (Admin Modal) --- */
        #admin-trigger { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 60px; 
            height: 60px; 
            background: transparent; 
            z-index: 9999; 
            cursor: default; 
        }
        
        .admin-modal { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 90%; 
            max-width: 450px; 
            background: rgba(15, 23, 42, 0.98); 
            backdrop-filter: blur(15px); 
            border-radius: 25px; 
            padding: 25px; 
            color: white; 
            display: none; 
            z-index: 10000; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .admin-modal.active { display: block; }
        
        .admin-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #334155; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
        }
        .btn-main { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.2s; 
        }
        .btn-main:hover { transform: scale(1.02); background: #7dd3fc; }
        
        .manage-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
            gap: 10px; 
            margin-top: 20px; 
            max-height: 250px; 
            overflow-y: auto; 
            padding: 5px; 
        }
        .manage-item { 
            position: relative; 
            height: 100px; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #334155; 
        }
        .manage-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .del-btn { 
            position: absolute; 
            top: 5px; 
            right: 5px; 
            background: #ef4444; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            padding: 2px 6px; 
            font-size: 12px; 
        }
        
        #upStatus { 
            font-size: 13px; 
            text-align: center; 
            color: var(--accent); 
            margin-top: 10px; 
        }
        input[type="password"] { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            background: #000; 
            color: #fff; 
            text-align: center; 
            box-sizing: border-box; 
            font-size: 1.1rem; 
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>
    <div class="back-date">01/04/2006</div>
    
    <div id="admin-trigger" ondblclick="toggleAdminModal()"></div>

    <div class="admin-modal" id="adminModal">
        <div class="admin-header">
            <h2 style="margin:0; font-size: 1.2rem; color:var(--accent)">إدارة الذكريات</h2>
            <span style="cursor:pointer; font-size: 20px; color:#94a3b8;" onclick="toggleAdminModal()">✕</span>
        </div>

        <div id="login-form">
            <input type="password" id="passInput" placeholder="أدخل كلمة السر">
            <button class="btn-main" onclick="checkPass()">دخول</button>
        </div>

        <div id="admin-content" style="display:none">
            <input type="file" id="photoInput" style="display:none" accept="image/*" onchange="uploadAction()">
            <button class="btn-main" onclick="document.getElementById('photoInput').click()">إضافة صورة جديدة +</button>
            <div id="upStatus"></div>
            <h3>الصور الحالية:</h3>
            <div class="manage-grid" id="managerGrid"></div>
        </div>
    </div>

    <div class="clothesline-wrapper" id="slider">
        <div class="rope"></div>
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // بيانات الربط الخاصة بمشروعك (Config)
        const firebaseConfig = {
            apiKey: "AIzaSyApDsjZMmLQDNrr7eYtUtGNohlgcHmFDs8",
            authDomain: "sondos-7cd69.firebaseapp.com",
            databaseURL: "https://sondos-7cd69-default-rtdb.firebaseio.com",
            projectId: "sondos-7cd69",
            storageBucket: "sondos-7cd69.firebasestorage.app",
            messagingSenderId: "604133952037",
            appId: "1:604133952037:web:96ba230dbea692a52c0dcc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const memoriesRef = ref(db, 'memories');

        // 1. جلب الصور وعرضها لحظياً على الحبل وفن لوحة التحكم
        onValue(memoriesRef, (snapshot) => {
            const data = snapshot.val();
            // مسح الصور القديمة قبل عرض التحديث
            document.querySelectorAll('.photo-item').forEach(el => el.remove());
            const managerGrid = document.getElementById('managerGrid');
            managerGrid.innerHTML = '';
            
            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    // العرض على حبل الغسيل
                    document.getElementById('slider').insertAdjacentHTML('beforeend', `
                        <div class="photo-item" style="--rotation: ${item.rot}deg">
                            <div class="clip"></div>
                            <img src="${item.img}" alt="Memory">
                        </div>
                    `);
                    // العرض في شبكة الإدارة للحذف
                    managerGrid.insertAdjacentHTML('beforeend', `
                        <div class="manage-item">
                            <img src="${item.img}">
                            <button class="del-btn" onclick="window.deleteItem('${key}')">حذف</button>
                        </div>
                    `);
                });
            }
        });

        // 2. الرفع المباشر (تحويل لـ Base64 وحفظ في Realtime Database)
        window.uploadAction = () => {
            const file = document.getElementById('photoInput').files[0];
            const status = document.getElementById('upStatus');
            if (!file) return;

            // التحقق بسيط من الحجم (اختياري)
            if(file.size > 2 * 1024 * 1024) {
                alert("الملف كبير جداً، يفضل أقل من 2 ميجا");
                return;
            }

            status.innerText = "جاري المعالجة والرفع...";
            const reader = new FileReader();
            reader.readAsDataURL(file); // تحويل الصورة لكود نصي
            reader.onload = async () => {
                try {
                    // دفع البيانات للداتابيز
                    await push(memoriesRef, {
                        img: reader.result, // كود الـ Base64
                        rot: (Math.random() * 10 - 5).toFixed(2), // دوران عشوائي
                        timestamp: Date.now() // وقت الرفع
                    });
                    status.innerText = "تم الرفع بنجاح! 😎";
                    document.getElementById('photoInput').value = ""; // تصفير الحقل
                } catch (e) { status.innerText = "خطأ في الاتصال!"; console.error(e); }
            };
        };

        // 3. منطق لوحة التحكم والحذف
        window.toggleAdminModal = () => document.getElementById('adminModal').classList.toggle('active');
        
        window.checkPass = () => {
            if(document.getElementById('passInput').value === "1420066") {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            } else { alert("الباسورد خطأ!"); }
        };

        window.deleteItem = (key) => {
            if(confirm("هل أنت متأكد من حذف هذه الصورة؟")) {
                remove(ref(db, 'memories/' + key));
            }
        };

        // 4. حركات النجوم وسحب حبل الغسيل
        const slider = document.getElementById('slider');
        let isDown = false, startX, scrollLeft;
        
        const start = (e) => { 
            if(e.target.closest('.photo-item')) return; // عدم تفعيل السحب عند الضغط على صورة
            isDown = true; 
            startX = (e.pageX || e.touches[0].pageX) - slider.offsetLeft; 
            scrollLeft = slider.scrollLeft; 
        };
        const end = () => isDown = false;
        const move = (e) => { 
            if(!isDown) return; 
            e.preventDefault(); 
            const x = (e.pageX || e.touches[0].pageX) - slider.offsetLeft; 
            const walk = (x - startX) * 2; // سرعة السحب
            slider.scrollLeft = scrollLeft - walk; 
        };
        
        slider.addEventListener('mousedown', start); slider.addEventListener('touchstart', start);
        window.addEventListener('mouseup', end); window.addEventListener('touchend', end);
        slider.addEventListener('mousemove', move); slider.addEventListener('touchmove', move);

        // توليد النجوم عشوائياً
        const starsContainer = document.getElementById('stars');
        for(let i=0; i<120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
