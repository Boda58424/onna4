<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory 2006 - Interactive Clothesline</title>
    <style>
        :root { 
            --rope-color: #5d4037; 
            --clip-color: #d4a373; 
            --accent: #38bdf8; 
            --bg-dark: #000814;
            --bg-blue: #001d3d;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background: radial-gradient(circle at center, var(--bg-blue) 0%, var(--bg-dark) 100%); 
            font-family: 'Segoe UI', sans-serif; user-select: none;
        }
        
        /* النجوم والتاريخ */
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--duration) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
        
        .back-date { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: clamp(4rem, 20vw, 15rem); font-weight: 900; 
            color: rgba(255, 255, 255, 0.03); z-index: 1; pointer-events: none; filter: blur(2px); 
        }

        /* حاوية الحبل - جعلناها مرنة لتناسب الموبايل والكمبيوتر */
        .clothesline-wrapper { 
            position: relative; top: 20%; width: 100%; height: 75vh; 
            cursor: grab; z-index: 10; overflow-x: auto; 
            white-space: nowrap; scrollbar-width: none; padding-top: 60px;
        }
        .clothesline-wrapper::-webkit-scrollbar { display: none; }
        
        .rope { 
            position: absolute; top: 95px; left: -200%; right: -200%; 
            height: 4px; background: linear-gradient(90deg, #3e2723 0%, #795548 50%, #3e2723 100%); 
            z-index: 5; box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }
        
        /* الصور - جعلنا حجمها يتفاعل مع طول الشاشة */
        .photo-item { 
            display: inline-block; position: relative; margin: 0 5vw; 
            vertical-align: top; z-index: 6; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }

        .photo-item:hover, .photo-item:active {
            transform: scale(1.15) rotate(0deg) !important;
            z-index: 100;
        }

        .clip { 
            position: absolute; top: 0px; left: 50%; transform: translateX(-50%); 
            width: 12px; height: 45px; background: var(--clip-color); 
            border-radius: 2px; z-index: 10; border-left: 1px solid #b1865a; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3); 
        }
        
        .photo-item img { 
            /* الصور هتاخد 55% من طول الشاشة عشان تبقى كبيرة وواضحة */
            height: 55vh; width: auto; min-width: 150px; max-width: 350px;
            object-fit: cover; border: 8px solid #fff; border-bottom: 40px solid #fff; 
            box-shadow: 10px 20px 40px rgba(0,0,0,0.6); 
            transform: rotate(var(--rotation)); margin-top: 15px; 
            display: block; transition: 0.3s;
        }

        /* لوحة التحكم */
        #admin-trigger { position: fixed; bottom: 0; left: 0; width: 60px; height: 60px; z-index: 9999; }
        .admin-modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85%; max-width: 400px; background: rgba(15, 23, 42, 0.98); 
            backdrop-filter: blur(15px); border-radius: 25px; padding: 20px; 
            color: white; display: none; z-index: 10000; border: 1px solid rgba(255,255,255,0.1); 
        }
        .admin-modal.active { display: block; }
        .btn-main { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .manage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .manage-item { position: relative; height: 80px; border-radius: 5px; overflow: hidden; }
        .manage-item img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 2px; right: 2px; background: #ef4444; color: white; border: none; border-radius: 3px; font-size: 10px; padding: 2px 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>
    <div class="back-date">01/04/2006</div>
    <div id="admin-trigger" ondblclick="toggleAdminModal()"></div>

    <div class="admin-modal" id="adminModal">
        <h3 style="text-align:center; color:var(--accent); margin-top:0;">إدارة الذكريات</h3>
        <div id="login-form">
            <input type="password" id="passInput" style="width:100%; padding:12px; border-radius:10px; background:#000; color:#fff; border:1px solid #334155;" placeholder="كلمة السر">
            <button class="btn-main" onclick="checkPass()">دخول</button>
        </div>
        <div id="admin-content" style="display:none">
            <input type="file" id="photoInput" style="display:none" accept="image/*" onchange="uploadAction()">
            <button class="btn-main" onclick="document.getElementById('photoInput').click()">رفع صورة جديدة +</button>
            <div id="upStatus" style="text-align:center; font-size:12px; margin-top:10px; color:var(--accent)"></div>
            <div class="manage-grid" id="managerGrid"></div>
        </div>
        <button onclick="toggleAdminModal()" style="width:100%; background:none; border:none; color:#777; margin-top:15px; cursor:pointer;">إغلاق</button>
    </div>

    <div class="clothesline-wrapper" id="slider">
        <div class="rope"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApDsjZMmLQDNrr7eYtUtGNohlgcHmFDs8",
            authDomain: "sondos-7cd69.firebaseapp.com",
            databaseURL: "https://sondos-7cd69-default-rtdb.firebaseio.com",
            projectId: "sondos-7cd69",
            storageBucket: "sondos-7cd69.firebasestorage.app",
            messagingSenderId: "604133952037",
            appId: "1:604133952037:web:96ba230dbea692a52c0dcc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const memoriesRef = ref(db, 'memories');

        onValue(memoriesRef, (snapshot) => {
            const data = snapshot.val();
            document.querySelectorAll('.photo-item').forEach(el => el.remove());
            const managerGrid = document.getElementById('managerGrid');
            managerGrid.innerHTML = '';
            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    document.getElementById('slider').insertAdjacentHTML('beforeend', `
                        <div class="photo-item" style="--rotation: ${item.rot}deg">
                            <div class="clip"></div>
                            <img src="${item.img}">
                        </div>
                    `);
                    managerGrid.insertAdjacentHTML('beforeend', `
                        <div class="manage-item">
                            <img src="${item.img}">
                            <button class="del-btn" onclick="window.deleteItem('${key}')">حذف</button>
                        </div>
                    `);
                });
            }
        });

        window.uploadAction = () => {
            const file = document.getElementById('photoInput').files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                await push(memoriesRef, { img: reader.result, rot: (Math.random() * 10 - 5).toFixed(2), timestamp: Date.now() });
                document.getElementById('upStatus').innerText = "تم الرفع بنجاح!";
            };
        };

        window.toggleAdminModal = () => document.getElementById('adminModal').classList.toggle('active');
        window.checkPass = () => {
            if(document.getElementById('passInput').value === "1420066") {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            } else { alert("غلط!"); }
        };
        window.deleteItem = (key) => { if(confirm("حذف؟")) remove(ref(db, 'memories/' + key)); };

        // السحب السلس
        const slider = document.getElementById('slider');
        let isDown = false, startX, scrollLeft;
        const start = (e) => { 
            if(e.target.closest('.photo-item')) return;
            isDown = true; startX = (e.pageX || e.touches[0].pageX) - slider.offsetLeft; scrollLeft = slider.scrollLeft; 
        };
        const move = (e) => { 
            if(!isDown) return; e.preventDefault();
            const x = (e.pageX || e.touches[0].pageX) - slider.offsetLeft; 
            slider.scrollLeft = scrollLeft - (x - startX) * 2; 
        };
        slider.addEventListener('mousedown', start); slider.addEventListener('touchstart', start);
        window.addEventListener('mouseup', () => isDown = false); window.addEventListener('touchend', () => isDown = false);
        slider.addEventListener('mousemove', move); slider.addEventListener('touchmove', move);

        const starsContainer = document.getElementById('stars');
        for(let i=0; i<100; i++) {
            const star = document.createElement('div'); star.className = 'star';
            star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's'); starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
